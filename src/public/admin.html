65.<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Admin Dashboard — LangChain</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <div class="header-inner">
      <h1>Admin Dashboard</h1>
      <nav class="toolbar">
        <a href="/chat.html">AI Chat</a>
        <a href="/documents.html">Documents</a>
        <a href="/appointments.html">Appointments</a>
        <a href="/tickets.html">Tickets</a>
        <a href="/admin.html" class="button-active">Admin</a>
      </nav>
      <div class="user-nav">
        <span id="userBadge"></span>
        <button id="logoutBtn" class="button-ghost" type="button">Logout</button>
      </div>
    </div>
  </header>

  <main class="container">
    <div class="card">
      <div class="card-header-with-actions">
        <h2>Registered Users</h2>
        <button onclick="fetchUsers()" class="button-primary button-small" type="button">Refresh</button>
      </div>
      <div id="userList">
        <table class="user-table">
          <thead>
            <tr>
              <th>Name</th>
              <th>Email</th>
              <th>Joined</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="userTableBody">
            <tr><td colspan="4" class="empty-state">Loading users...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </main>

  <div id="editModal" class="modal-overlay" hidden>
    <div class="modal">
      <h3>Edit User</h3>
      <input type="hidden" id="editUserId" />
      <label>Name</label>
      <input type="text" id="editName" />
      <label>Email</label>
      <input type="email" id="editEmail" />
      <label>New Password (leave blank to keep current)</label>
      <input type="password" id="editPassword" placeholder="••••••••" />
      <div class="modal-btns">
        <button onclick="saveUser()" class="button-primary button-flex-1" type="button">Save Changes</button>
        <button onclick="closeModal()" class="button-ghost button-flex-1 button-error-text button-error-border" type="button">Cancel</button>
      </div>
    </div>
  </div>

  <script>
    console.log("admin.html script starting...");
  </script>
  <script src="/script.js"></script>
  <script>
    console.log("admin.html script finished loading script.js");
  </script>
  <script>
    // Security: Only allow if user is 'admin'
    currentUser = JSON.parse(sessionStorage.getItem('currentUser') || 'null');
    console.log('currentUser:', currentUser);
    console.log('currentUser.email:', currentUser?.email);
    if (!currentUser || currentUser?.email !== 'admin@agentic.ai') {
      alert('Access Denied: Admins Only');
      window.location.href = '/chat.html';
    }

    async function fetchUsers() {
      try {
        const resp = await fetch(`/admin/users?adminId=${currentUser.id}`);
        const data = await resp.json();
        if (!resp.ok) throw new Error(data.error);
        renderUsers(data.users);
      } catch (err) {
        showToast(err.message, 'error');
      }
    }

    function renderUsers(users) {
      const tbody = document.getElementById('userTableBody');
      tbody.innerHTML = '';
      if (!users.length) {
        tbody.innerHTML = '<tr><td colspan="4" class="empty-state">No users found.</td></tr>';
        return;
      }
      users.forEach(u => {
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td>${escapeHtml(u.name)}</td>
          <td>${escapeHtml(u.email)}</td>
          <td>${new Date(u.createdAt).toLocaleDateString()}</td>
          <td class="actions">
            <button class="button-primary button-small" onclick="openEditModal('${u.id}', '${escapeHtml(u.name)}', '${escapeHtml(u.email)}')">Edit</button>
            <button class="button-ghost button-small button-error-text button-error-border" onclick="deleteUser('${u.id}')">Delete</button>
          </td>
        `;
        tbody.appendChild(tr);
      });
    }

    function openEditModal(id, name, email) {
      document.getElementById('editUserId').value = id;
      document.getElementById('editName').value = name;
      document.getElementById('editEmail').value = email;
      document.getElementById('editPassword').value = '';
      document.getElementById('editModal').hidden = false;
    }

    function closeModal() {
      document.getElementById('editModal').hidden = true;
    }

    async function saveUser() {
      const id = document.getElementById('editUserId').value;
      const name = document.getElementById('editName').value;
      const email = document.getElementById('editEmail').value;
      const password = document.getElementById('editPassword').value;

      try {
        const resp = await fetch(`/admin/users/${id}`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, email, password, adminId: currentUser.id })
        });
        if (!resp.ok) throw new Error('Failed to update user');
        showToast('User updated successfully');
        closeModal();
        fetchUsers();
      } catch (err) {
        showToast(err.message, 'error');
      }
    }

    async function deleteUser(id) {
      if (!confirm('Are you sure you want to delete this user? All their data will be lost.')) return;
      try {
        const resp = await fetch(`/admin/users/${id}?adminId=${currentUser.id}`, { method: 'DELETE' });
        if (!resp.ok) throw new Error('Failed to delete user');
        showToast('User deleted');
        fetchUsers();
      } catch (err) {
        showToast(err.message, 'error');
      }
    }



    fetchUsers();
  </script>
</body>
</html>
