<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Login / Register — LangChain Chat</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="centered-page-body">
  <div class="auth-shell">
    <div class="hero-copy">
      <h1>Secure access to your AI workspace</h1>
      <p>Sign in or register to access your documents, chat history, and appointment workflow in a single, polished experience.</p>
    </div>

    <div class="card">
      <div class="tab-buttons">
        <button id="loginTab" class="active" type="button">Login</button>
        <button id="registerTab" type="button">Register</button>
      </div>

      <h2 id="formTitle">Login to your account</h2>
      <p id="formSubtitle" class="subtitle">Use your email and password to continue to the AI assistant.</p>
      <div id="message" class="message" hidden></div>

      <form id="loginForm">
        <label for="loginEmail">Email</label>
        <input id="loginEmail" name="email" type="email" autocomplete="email" required />

        <label for="loginPassword">Password</label>
        <input id="loginPassword" name="password" type="password" autocomplete="current-password" required />

        <button type="submit" class="button-primary">Continue to chat</button>
      </form>

      <form id="registerForm" hidden>
        <label for="registerName">Full name</label>
        <input id="registerName" name="name" type="text" autocomplete="name" required />

        <label for="registerEmail">Email</label>
        <input id="registerEmail" name="email" type="email" autocomplete="email" required />

        <label for="registerPassword">Password</label>
        <input id="registerPassword" name="password" type="password" autocomplete="new-password" required />

        <button type="submit" class="button-primary">Create account</button>
      </form>


    </div>
  </div>

  <script>
    const loginTab = document.getElementById('loginTab');
    const registerTab = document.getElementById('registerTab');
    const loginForm = document.getElementById('loginForm');
    const registerForm = document.getElementById('registerForm');
    const formTitle = document.getElementById('formTitle');
    const formSubtitle = document.getElementById('formSubtitle');
    const messageEl = document.getElementById('message');

    const showTab = (tab) => {
      const isLogin = tab === 'login';
      loginForm.hidden = !isLogin;
      registerForm.hidden = isLogin;
      loginTab.classList.toggle('active', isLogin);
      registerTab.classList.toggle('active', !isLogin);
      formTitle.textContent = isLogin ? 'Login to your account' : 'Create a new account';
      formSubtitle.textContent = isLogin
        ? 'Use your email and password to continue to the AI assistant.'
        : 'Register a new account and keep your documents and chat history separate.';
      messageEl.hidden = true;
    };

    loginTab.addEventListener('click', () => showTab('login'));
    registerTab.addEventListener('click', () => showTab('register'));

    const ADMIN_CREDENTIALS = {
      email: 'admin@agentic.ai',
      password: 'admin',
    };

    const saveSessionUser = (user, redirectPath = '/chat.html') => {
      sessionStorage.setItem('currentUser', JSON.stringify(user));
      window.location.href = redirectPath;
    };

    loginForm.addEventListener('submit', async (event) => {
      event.preventDefault();
      messageEl.hidden = true;
      const email = document.getElementById('loginEmail').value.trim();
      const password = document.getElementById('loginPassword').value;
      const isAdminLogin =
        (email === 'admin' || email === ADMIN_CREDENTIALS.email) &&
        password === ADMIN_CREDENTIALS.password;

      if (isAdminLogin) {
        saveSessionUser({
          id: 'admin',
          name: 'Admin',
          email: ADMIN_CREDENTIALS.email,
          role: 'admin',
        }, '/admin.html');
        return;
      }

      try {
        const resp = await fetch('/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password }),
        });
        const data = await resp.json();
        if (!resp.ok) throw new Error(data.error || 'Login failed');
        saveSessionUser(data.user);
      } catch (error) {
        messageEl.textContent = error.message;
        messageEl.className = 'message error';
        messageEl.hidden = false;
      }
    });

    registerForm.addEventListener('submit', async (event) => {
      event.preventDefault();
      messageEl.hidden = true;
      const name = document.getElementById('registerName').value.trim();
      const email = document.getElementById('registerEmail').value.trim();
      const password = document.getElementById('registerPassword').value;

      try {
        const resp = await fetch('/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, email, password }),
        });
        const data = await resp.json();
        if (!resp.ok) throw new Error(data.error || 'Registration failed');
        saveSessionUser(data.user);
      } catch (error) {
        messageEl.textContent = error.message;
        messageEl.className = 'message error';
        messageEl.hidden = false;
      }
    });
  </script>
</body>
</html>
